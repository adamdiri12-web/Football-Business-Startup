<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Saha Sports PFP Preview</title>
<style>
  body { margin: 0; padding: 2rem; background: #1c1917; display: flex; flex-direction: column; align-items: center; gap: 2rem; font-family: system-ui, sans-serif; color: #fafaf9; }
  .label { font-size: 0.9rem; opacity: 0.7; }
  .frame { display: flex; flex-direction: column; align-items: center; gap: 0.5rem; }
  img { display: block; background: #fff; }
  .full img { width: 400px; height: 400px; }
  .ig img { width: 150px; height: 150px; border-radius: 50%; }
  .ig-small img { width: 56px; height: 56px; border-radius: 50%; }
</style>
</head>
<body>
  <div class="frame full"><div class="label">FULL 1080×1080</div><img src="saha-sports-pfp.svg" alt=""></div>
  <div class="frame ig"><div class="label">IG PROFILE CIRCLE (150px)</div><img src="saha-sports-pfp.svg" alt=""></div>
  <div class="frame ig-small"><div class="label">IG STORY RING (56px)</div><img src="saha-sports-pfp.svg" alt=""></div>
</body>
</html>
